<!DOCTYPE html>
<html>
<head>
    <title>Aesthetic Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: #00ffe7;
            text-align: center;
        }

        h1 {
            padding: 30px 10px;
            font-size: 40px;
            letter-spacing: 3px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            display: block;
        }

    </style>
</head>

<body>

    <h1>✨ Aesthetic Gallery ✨</h1>

    <div class="container">

        <!-- Hills -->
        <div class="card">
            <img src="hills.webp" alt="Hills">
        </div>

        <!-- Mountain -->
        <div class="card">
            <img src="mountain.avif" alt="Mountain">
        </div>

        <!-- City -->
        <div class="card">
            <img src="city.jpg" alt="City">
        </div>

        <!-- Night City -->
        <div class="card">
            <img src="night.jpg" alt="Night City">
        </div>

        <!-- Lion -->
        <div class="card">
            <img src="lion.webp" alt="Lion">
        </div>

        <!-- Elephant -->
        <div class="card">
            <img src="elephant.jpg" alt="Elephant">
        </div>

    </div>

</body>
</html>
